<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Media Downloader</title>

<style>
*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0f172a;
color:white;
}

.card{
width:90%;
max-width:450px;
background:#1e293b;
padding:30px;
border-radius:20px;
text-align:center;
}

h1{
font-size:28px;
}

input{
width:100%;
padding:15px;
border-radius:12px;
border:none;
margin:15px 0;
}

button{
width:100%;
padding:14px;
margin:8px 0;
border:0;
border-radius:12px;
font-size:16px;
cursor:pointer;
background:#2563eb;
color:white;
}

button:hover{
background:#1d4ed8;
}

#result{
margin-top:15px;
background:#334155;
padding:12px;
border-radius:10px;
}

.small{
color:#94a3b8;
font-size:13px;
}

</style>

</head>

<body>


<div class="card">

<h1>⬇ Media Downloader</h1>

<p class="small">
Download your media easily
</p>


<input id="url" placeholder="Paste media URL">


<button onclick="send('mp3')">
🎵 Download MP3
</button>


<button onclick="send('video')">
🎬 Download Video
</button>


<div id="result">
Waiting...
</div>


</div>


<script>

async function send(type){


let url =
document.getElementById("url").value;


if(!url){
document.getElementById("result").innerHTML=
"Enter URL first";
return;
}


document.getElementById("result").innerHTML=
"Processing...";


try{


let response = await fetch("/download",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

url:url,
type:type

})

});


let data = await response.json();


document.getElementById("result").innerHTML=
data.message;


}

catch(e){

document.getElementById("result").innerHTML=
"Server error";

}


}


</script>


</body>
</html>
